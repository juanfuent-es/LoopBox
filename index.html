<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoopBox</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <aside class="panel">
      <h1>LoopBox</h1>
      <div class="controls">
        <button id="audio-button">Iniciar audio</button>
        <div class="row">
          <button id="add-layer">Añadir layer</button>
          <button id="remove-layer">Eliminar</button>
        </div>
        <label>
          Layer activo
          <select id="layer-select"></select>
        </label>
        <label>
          Frecuencia (Hz)
          <input id="freq" type="range" min="20" max="1200" step="1" />
        </label>
        <label>
          Amplitud
          <input id="amp" type="range" min="0" max="1" step="0.01" />
        </label>
        <label>
          Velocidad
          <input id="speed" type="range" min="0.1" max="6" step="0.1" />
        </label>
        <label>
          Fase (rad)
          <input id="phase" type="range" min="0" max="6.283" step="0.01" />
        </label>
        <p class="hint">
          Arrastra dentro del canvas para desplazar fase y construir patrones de
          interferencia.
        </p>
      </div>
    </aside>
    <main id="canvas-root"></main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/2.0.5/p5.min.js" integrity="sha512-jOTg6ikYiHx1LvbSOucnvZi4shXbaovZ91+rfViIiUFLgAJK+k1oQtGEaLvDB8rsZwEfUksTgmhrxdvEDykuzQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/15.3.5/Tone.js" integrity="sha512-F1myjNkIKU5XJtOs1HXRo/zOjiUsABgFEEGKLx/riwK82jRThZFebEnfF2HWo9eeC+iC1Nwwnn9Vj6OGq+r7rQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="./js/sketch.js"></script>
  </body>
</html>
