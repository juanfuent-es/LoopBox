<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoopBox</title>
    <script src="./node_modules/p5/lib/p5.min.js"></script>
    <script src="./node_modules/tone/build/Tone.js"></script>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, sans-serif;
        background: #0e0f16;
        color: #e7e8ee;
        display: grid;
        grid-template-columns: minmax(280px, 320px) 1fr;
        min-height: 100vh;
      }
      .panel {
        border-right: 1px solid #232639;
        background: #141728;
        padding: 16px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.2rem;
      }
      .controls {
        display: grid;
        gap: 10px;
      }
      label {
        display: grid;
        gap: 4px;
        font-size: 0.85rem;
      }
      input,
      button,
      select {
        background: #1e2236;
        color: #e7e8ee;
        border: 1px solid #2d3351;
        border-radius: 6px;
        padding: 8px;
      }
      input[type="range"] {
        padding: 0;
      }
      .row {
        display: flex;
        gap: 8px;
      }
      #canvas-root {
        display: grid;
        place-items: center;
        overflow: hidden;
      }
      .hint {
        font-size: 0.75rem;
        color: #a9adc0;
      }
    </style>
  </head>
  <body>
    <aside class="panel">
      <h1>LoopBox</h1>
      <div class="controls">
        <button id="audio-button">Iniciar audio</button>
        <div class="row">
          <button id="add-layer">Añadir layer</button>
          <button id="remove-layer">Eliminar</button>
        </div>
        <label>
          Layer activo
          <select id="layer-select"></select>
        </label>
        <label>
          Frecuencia (Hz)
          <input id="freq" type="range" min="20" max="1200" step="1" />
        </label>
        <label>
          Amplitud
          <input id="amp" type="range" min="0" max="1" step="0.01" />
        </label>
        <label>
          Velocidad
          <input id="speed" type="range" min="0.1" max="6" step="0.1" />
        </label>
        <label>
          Fase (rad)
          <input id="phase" type="range" min="0" max="6.283" step="0.01" />
        </label>
        <p class="hint">
          Arrastra dentro del canvas para desplazar fase y construir patrones de
          interferencia.
        </p>
      </div>
    </aside>
    <main id="canvas-root"></main>
    <script src="sketch.js"></script>
  </body>
</html>
